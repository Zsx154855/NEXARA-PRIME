name: NEXARA CI
on:
  push:
    branches: [main, "work/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install hatchling
          pip install -e .
          python -m pytest tests/ -q

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build
        working-directory: platform/sdk/typescript
        run: |
          npm ci
          npx tsc --noEmit

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build NexaraCore
        working-directory: experience/NexaraCore
        run: swift build
      - name: Build NexaraMac
        working-directory: experience/macos
        run: swift build

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml
      - name: Validate JSON state files
        run: |
          for f in .nexara/*.json; do
            echo "Checking $f..."
            python3 -c "import json; json.load(open('$f')); print('  OK')" || exit 1
          done
      - name: Detect state drift
        run: python3 scripts/governance/detect_state_drift.py
      - name: Validate YAML governance files
        run: |
          shopt -s globstar
          for f in governance/**/*.yaml; do
            echo "Checking $f..."
            python3 -c "import yaml; yaml.safe_load(open('$f')); print('  OK')" || exit 1
          done

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          PATTERN='(api_key|secret_key|private_key|password|token)\s*=\s*"[A-Za-z0-9_\-]{8,}"'
          if grep -rnE "$PATTERN" src/ tests/ --include="*.py" 2>/dev/null; then
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            echo "SECRET SCAN FAILED: hardcoded secrets found"
            exit 1
          fi
          echo "Secret scan: CLEAN"
