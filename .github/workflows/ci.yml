name: NEXARA CI
on:
  push:
    branches: [main, "work/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e .
      - run: python -m pytest tests/ -q

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd platform/sdk/typescript && npm ci && npx tsc --noEmit

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd experience/NexaraCore && swift build
      - run: cd experience/macos && swift build

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: |
          for f in .nexara/*.json; do
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done
      - run: python3 scripts/governance/detect_state_drift.py
      - run: |
          pip install pyyaml
          for f in governance/**/*.yaml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if grep -rnE '(api_key|secret|password|token)\s*=\s*["'"'"'][A-Za-z0-9_\-]{8,}' src/ tests/ --include="*.py"; then
            echo "SECRET SCAN FAILED"
            exit 1
          fi
          echo "Secret scan: CLEAN"
