# ═══════════════════════════════════════════════════════════════
# 4. PROHIBITED BEHAVIORS
# ═══════════════════════════════════════════════════════════════

prohibited:
  - id: PROHIBIT_01
    rule: "Kernel MUST NOT self-verify"
    description: "The kernel executes missions. It MUST NOT create PASS verdicts for its own executions."
    invariant: INVARIANT_03
    enforcement: "Receipt creation requires independent auditor (different agent/model)"

  - id: PROHIBIT_02
    rule: "Kernel MUST NOT bypass governance"
    description: "All R3+ risk actions and external-effect capabilities require ApprovalEngine approval."
    source: "authority_matrix_v1.yaml rule R2"
    enforcement: "ApprovalEngine check before every R3+ action"

  - id: PROHIBIT_03
    rule: "Kernel MUST NOT grant permissions"
    description: "Permission grant is always external (human). No self-escalation."
    invariant: INVARIANT_01
    enforcement: "Permission check at capability invocation; no self-modification of permissions"

  - id: PROHIBIT_04
    rule: "Kernel MUST NOT overwrite evidence"
    description: "Evidence is append-only, immutable. Kernel creates evidence through EvidenceStore, never modifies."
    invariant: INVARIANT_04
    enforcement: "EvidenceStore.append() only; no update/delete methods exposed to kernel"

  - id: PROHIBIT_05
    rule: "Kernel MUST NOT declare mission complete without full chain"
    description: "Completion requires: Success Criteria + Evidence + Audit + Receipt + Reflection."
    invariant: INVARIANT_05
    enforcement: "State machine enforces all 5 gates before Completed state"

  - id: PROHIBIT_06
    rule: "Kernel MUST NOT skip the state machine"
    description: "All mission state transitions go through state_machine.py validation."
    enforcement: "No direct state assignment; all transitions through MissionStateMachine.transition()"

  - id: PROHIBIT_07
    rule: "Kernel MUST NOT modify NSEC or G1 Contracts"
    description: "NSEC V2.1 is supreme. G1 contracts are frozen. Kernel operates UNDER them."
    enforcement: "Contract files are read-only at kernel level"

