# ═══════════════════════════════════════════════════════════════
# 1. KERNEL RESPONSIBILITY BOUNDARY
# ═══════════════════════════════════════════════════════════════
# The kernel IS the mission lifecycle engine. Nothing more, nothing less.
# Everything below "kernel boundary" already exists in the codebase.

kernel_scope:

  # ── IN SCOPE (these ARE the kernel) ──
  in_scope:

    - component: Mission Lifecycle
      description: "The complete 29-state mission lifecycle: Intent → Triage → Context → Contract → Plan → Simulation → Approval → Execution → Verification → Evidence → MemoryPatch → Evaluation → Completion"
      existing_implementation: "runtime.py:NexaraRuntime (1083 lines)"
      kernel_role: "OWNER — the kernel is the single authority for mission state transitions"

    - component: Mission State Machine
      description: "Deterministic state transition graph with validation on every transition"
      existing_implementation: "state_machine.py:MissionStateMachine (115 lines)"
      kernel_role: "OWNER — validates and enforces all state transitions"

    - component: Mission Triage
      description: "Intent classification, risk assessment, priority assignment"
      existing_implementation: "mission_triage.py:MissionTriageEngine (350 lines)"
      kernel_role: "OWNER — first touchpoint after human intent"

    - component: Mission Compilation
      description: "Translation of MissionSpec into executable MissionPlan"
      existing_implementation: "mission_compiler.py:MissionCompiler (65 lines)"
      kernel_role: "OWNER — spec→plan translation is kernel logic"

    - component: Work Contract Engine
      description: "Creation and validation of WorkContract with boundaries, constraints, deliverables"
      existing_implementation: "contract_engine.py:ContractEngine (24 lines)"
      kernel_role: "OWNER — contract is the binding agreement between intent and execution"

    - component: Orchestration (7 Subsystems)
      description: "MissionQueue, WorkerScheduler, WriterLease, ApprovalQueue, RecoveryQueue, EvidenceQueue, RuntimeOrchestrator"
      existing_implementation: "orchestration.py (935 lines)"
      kernel_role: "OWNER — the kernel orchestrates all mission execution"

    - component: Adaptive Scheduling
      description: "Multi-agent, multi-model scheduling with capability matching"
      existing_implementation: "adaptive_scheduler.py:AdaptiveMultiAgentScheduler (480 lines)"
      kernel_role: "OWNER — agent assignment is kernel logic"

  # ── OUT OF SCOPE (these are NOT the kernel) ──
  out_of_scope:

    - component: Database / Persistence
      reason: "Storage is infrastructure. The kernel depends on it but does not own it."
      existing_implementation: "db.py:SQLiteStore (1400 lines)"
      relationship: "DEPENDS_ON — kernel calls db for persistence"

    - component: REST API
      reason: "API is an external interface. The kernel is callable through it but does not own it."
      existing_implementation: "api.py:FastAPI app factory (236 lines)"
      relationship: "EXPOSED_BY — API wraps kernel methods"

    - component: CLI
      reason: "CLI is a human interface. Not kernel logic."
      existing_implementation: "cli.py (597 lines)"
      relationship: "EXPOSED_BY — CLI wraps kernel methods"

    - component: Model Gateway / Router
      reason: "Model selection and provider abstraction is infrastructure."
      existing_implementation: "model_gateway.py (300 lines), model_router.py (300 lines)"
      relationship: "DEPENDS_ON — kernel routes work through model gateway"

    - component: Tools / Capability Runtime
      reason: "Tool execution sandbox is infrastructure, not kernel logic."
      existing_implementation: "tools.py:ToolRuntime (600 lines), capabilities.py (280 lines)"
      relationship: "DEPENDS_ON — kernel delegates execution to tool runtime"

    - component: Connectors / Adapters
      reason: "Browser, Git, message, deployment adapters are external integrations."
      existing_implementation: "connectors/ (9 modules), *_adapter.py (5 files)"
      relationship: "DEPENDS_ON — kernel invokes adapters through capability layer"

    - component: Evidence Store
      reason: "Evidence is a separate domain with its own authority (append-only, immutable)."
      existing_implementation: "evidence.py:EvidenceStore (650 lines)"
      relationship: "DEPENDS_ON — kernel creates evidence through evidence store; kernel does not verify its own evidence"

    - component: Memory Kernel
      reason: "Memory is a separate domain with its own governance (evidence-backed, approved patches)."
      existing_implementation: "memory.py:MemoryKernel (680 lines)"
      relationship: "DEPENDS_ON — kernel triggers memory updates; memory enforces its own rules"

    - component: Evaluation Engine
      reason: "Evaluation is an independent audit function, not kernel self-assessment."
      existing_implementation: "evaluation.py:EvaluationEngine (170 lines)"
      relationship: "DEPENDS_ON — kernel triggers evaluation; evaluation is independent"

    - component: Governance / Approval / NSEC
      reason: "Governance is SUPREME over the kernel. The kernel obeys governance, not the reverse."
      existing_implementation: "governance.py (550 lines)"
      relationship: "GOVERNED_BY — kernel operates under governance constraints"

    - component: UI / Experience Layer
      reason: "macOS, iOS, web are presentation layers. INVARIANT_02: Canvas cannot bypass Runtime."
      existing_implementation: "experience/ (NexaraMac, NexaraIOS, NexaraCore)"
      relationship: "EXPOSED_BY — UI renders kernel state, routes input through API"

# ═══════════════════════════════════════════════════════════════
# 2. KERNEL INPUT/OUTPUT CONTRACT
# ═══════════════════════════════════════════════════════════════

kernel_contract:

  inputs:
    - name: HumanIntent
      type: "mission_triage.MissionDecisionRecord"
      source: "external (human via API/CLI)"
      validation: "MissionTriageEngine validates intent before kernel accepts it"

    - name: ApprovedMission
      type: "models.Mission"
      source: "ApprovalEngine (governance.py)"
      precondition: "state in [Approved, Running]"

    - name: AgentCapability
      type: "capabilities.CapabilityRegistry entry"
      source: "CapabilityRegistry"
      precondition: "capability registered, permissions checked"

    - name: ModelResponse
      type: "model_gateway.ProviderResponse"
      source: "ModelGateway"
      precondition: "provider available, token budget remaining"

  outputs:
    - name: MissionState
      type: "models.MissionState"
      constraint: "Only valid transitions per state machine"

    - name: ExecutionResult
      type: "dict"
      constraint: "Includes result, evidence_refs, tool_invocations"

    - name: EvidenceRecord
      type: "models.EvidenceArtifact"
      constraint: "Immutable after creation. Created through EvidenceStore, not directly."

    - name: MemoryPatchRequest
      type: "models.MemoryRecord"
      constraint: "Requires source_evidence_id. Subject to Memory governance."

    - name: EvaluationTrigger
      type: "evaluation.EvaluationRequest"
      constraint: "Evaluation is independent — kernel requests, does not self-score."

  errors:
    - name: MissionBlocked
      condition: "approval denied, resource exhausted, or external blocker"
    - name: MissionFailed
      condition: "execution error, verification failure, or unrecoverable state"
    - name: KernelPanic
      condition: "state machine invariant violation, writer lease conflict, or governance block"

